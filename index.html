<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Download Hub</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f0f0f;
color:#fff;
padding:15px;
padding-bottom:80px;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
gap:15px;
flex-wrap:wrap;
margin-bottom:25px;
}

.logo{
font-size:clamp(24px,4vw,34px);
font-weight:bold;
}

.search{
padding:12px;
width:350px;
max-width:100%;
border:none;
border-radius:12px;
}

.grid{
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(260px,1fr));
gap:18px;
}

.card{
background:#1c1c1c;
padding:15px;
border-radius:20px;
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
border-radius:12px;
}

.category{
display:inline-block;
margin-top:10px;
padding:6px 12px;
border-radius:20px;
background:#333;
font-size:12px;
}

.title{
font-size:22px;
margin-top:10px;
}

.desc{
margin:10px 0;
color:#bbb;
}

.btn{
padding:10px 15px;
border:none;
border-radius:10px;
background:#00c853;
color:white;
cursor:pointer;
margin-right:8px;
margin-top:10px;
}

.deleteBtn{
background:#d32f2f;
}

.admin{
margin-top:40px;
background:#1b1b1b;
padding:20px;
border-radius:20px;
}

.admin input,
.admin textarea{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:10px;
}

.ad-box{
background:#1b1b1b;
padding:15px;
margin:20px 0;
border-radius:20px;
display:flex;
justify-content:center;
overflow:hidden;
}

.mobileSticky{
position:fixed;
bottom:0;
left:0;
width:100%;
display:flex;
justify-content:center;
z-index:999;
}

@media(max-width:768px){

.card img{
height:150px;
}

.logo{
width:100%;
text-align:center;
}

.search{
width:100%;
}

}

</style>
</head>
<body>

<header>

<div class="logo">
Download Hub
</div>

<input
class="search"
id="search"
placeholder="Search files..."
onkeyup="searchFiles()"
/>

</header>


<!-- TOP 728x90 -->

<div class="ad-box">

<script>
atOptions={
'key':'442144ea6b334db8968335d84fad9e67',
'format':'iframe',
'height':90,
'width':728,
'params':{}
};
</script>

<script src="https://www.highperformanceformat.com/442144ea6b334db8968335d84fad9e67/invoke.js"></script>

</div>


<div
class="grid"
id="container">
</div>



<div
id="loginBox"
class="admin">

<h2>Admin Login</h2>

<input
type="password"
id="adminPass"
placeholder="Password"
/>

<button
class="btn"
onclick="login()">

Login

</button>

</div>



<div
class="admin"
id="adminPanel"
style="display:none">

<h2>
Admin Upload
</h2>

<input
id="name"
placeholder="Title">

<textarea
id="desc"
placeholder="Description">
</textarea>

<input
id="category"
placeholder="PDF / APK / ZIP">

<input
id="image"
placeholder="Thumbnail URL">

<input
id="link"
placeholder="Google Drive Link">

<button
class="btn"
onclick="addFile()">

Add File

</button>

<button
class="btn"
onclick="logout()">

Logout

</button>

</div>



<!-- NATIVE 2:2 -->

<div class="ad-box">

<script async="async"
data-cfasync="false"
src="https://pl29538097.effectivecpmnetwork.com/17fcfae12b288e2760c37dd3c08d066b/invoke.js">
</script>

<div id="container-17fcfae12b288e2760c37dd3c08d066b"></div>

</div>



<!-- SOCIAL BAR -->

<script src="https://pl29538096.effectivecpmnetwork.com/2b/8e/84/2b8e842fc7172c9c6e9453d58fd9a098.js"></script>


<!-- POPUNDER -->

<script src="https://pl29538098.effectivecpmnetwork.com/4a/18/53/4a1853f5ac193d9c4e94aa57aa940207.js"></script>



<!-- MOBILE STICKY -->

<div class="mobileSticky">

<script>
atOptions={
'key':'e1f5d78d388fef7be41527447a14b4c9',
'format':'iframe',
'height':50,
'width':320,
'params':{}
};
</script>

<script src="https://www.highperformanceformat.com/e1f5d78d388fef7be41527447a14b4c9/invoke.js"></script>

</div>


<script>

const ADMIN_PASSWORD=
"jaya@2911"

const container=
document.getElementById(
"container"
)

let files=
JSON.parse(
localStorage.getItem(
"files"
)
)||[]


function convertDrive(url){

let id=
url.match(
/[-\w]{25,}/
)

if(id){

return `https://drive.google.com/uc?export=download&id=${id[0]}`

}

return url

}



function render(){

let html=""

const isAdmin=
localStorage.getItem(
"admin"
)==="true"


files.forEach(
(file,index)=>{

html+=`

<div class="card">

<img src="${file.image}">

<div class="category">
${file.category}
</div>

<div class="title">
${file.name}
</div>

<div class="desc">
${file.desc}
</div>

<a href="${file.link}" target="_blank">

<button class="btn">
Download
</button>

</a>

${isAdmin ?

`<button
class="btn deleteBtn"
onclick="deleteFile(${index})">

Delete

</button>`

:""}

</div>

`

if((index+1)%6===0){

html+=`

<div class="ad-box">

Native Ad

</div>

`

}

})

container.innerHTML=html

}


render()



function addFile(){

let obj={

name:name.value,
desc:desc.value,
category:category.value,
image:image.value,
link:convertDrive(link.value)

}

files.push(obj)

localStorage.setItem(
"files",
JSON.stringify(files)
)

render()

document
.querySelectorAll(
".admin input,.admin textarea"
)
.forEach(
x=>x.value=""
)

}



function deleteFile(index){

if(confirm(
"Delete file?"
)){

files.splice(
index,
1
)

localStorage.setItem(
"files",
JSON.stringify(files)
)

render()

}

}



function login(){

if(
adminPass.value
===ADMIN_PASSWORD
){

localStorage.setItem(
"admin",
"true"
)

showAdmin()

}else{

alert(
"Wrong password"
)

}

}



function showAdmin(){

loginBox.style.display=
"none"

adminPanel.style.display=
"block"

render()

}



function logout(){

localStorage.removeItem(
"admin"
)

location.reload()

}



if(
localStorage.getItem(
"admin"
)==="true"
){

showAdmin()

}



function searchFiles(){

let value=
search.value
.toLowerCase()

document
.querySelectorAll(
".card"
)
.forEach(card=>{

card.style.display=

card.innerText
.toLowerCase()
.includes(value)

?"block"
:"none"

})

}

</script>

</body>
</html>
