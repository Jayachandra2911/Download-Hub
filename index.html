<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#090b10">
    <meta name="description" content="A responsive cloud synced download hub powered by Supabase.">
    <title>Download Hub</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="preconnect" href="https://images.unsplash.com">
    <link rel="preconnect" href="https://picsum.photos">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <noscript>This download hub needs JavaScript enabled to load files.</noscript>

    <header class="site-header">
      <nav class="nav-shell" aria-label="Primary navigation">
        <a class="brand" href="#home" aria-label="Download Hub home">
          <span class="brand-mark">DH</span>
          <span>
            <strong>Download Hub</strong>
            <small>Cloud synced files</small>
          </span>
        </a>

        <div class="header-tools">
          <label class="search-box" for="searchInput">
            <span aria-hidden="true">Search</span>
            <input id="searchInput" type="search" placeholder="Search files..." autocomplete="off">
          </label>
          <select id="categoryFilter" class="category-filter" aria-label="Filter by category">
            <option value="all">All categories</option>
          </select>
        </div>

        <div class="nav-actions">
          <a class="ghost-link" href="#home">Files</a>
          <a class="ghost-link" href="#admin" id="adminNavLink">Admin</a>
          <button class="ghost-button hidden" id="logoutButton" type="button">Logout</button>
        </div>
      </nav>
    </header>

    <main>
      <section class="ad-band ad-top" aria-label="Advertisement">
        <div class="ad-frame ad-frame-top">
          <script>
            atOptions = {
              'key': '442144ea6b334db8968335d84fad9e67',
              'format': 'iframe',
              'height': 90,
              'width': 728,
              'params': {}
            };
          </script>
          <script src="https://www.highperformanceformat.com/442144ea6b334db8968335d84fad9e67/invoke.js"></script>
        </div>
      </section>

      <section class="admin-section hidden" id="adminPanel" aria-labelledby="adminPanelTitle">
        <div class="section-heading">
          <p class="eyebrow">Admin tools</p>
          <h2 id="adminPanelTitle">Upload a new file</h2>
        </div>

        <form class="admin-form" id="downloadForm" novalidate>
          <div class="form-grid">
            <label>
              <span>Title</span>
              <input name="name" type="text" maxlength="120" required placeholder="Example: Class 10 Notes">
            </label>
            <label>
              <span>Category</span>
              <select name="category" required>
                <option value="">Select category</option>
                <option>PDF</option>
                <option>ZIP</option>
                <option>APK</option>
                <option>Images</option>
                <option>Notes</option>
                <option>Software</option>
                <option>Other files</option>
              </select>
            </label>
            <label class="wide-field">
              <span>Description</span>
              <textarea name="description" rows="3" maxlength="280" required placeholder="Short helpful description"></textarea>
            </label>
            <label>
              <span>Thumbnail URL</span>
              <input name="thumbnail" type="url" required placeholder="Google Drive thumbnail link or direct thumbnail URL">
            </label>
            <label>
              <span>Download URL</span>
              <input name="file_link" type="url" required placeholder="Google Drive file sharing link">
            </label>
          </div>
          <button class="primary-button" id="submitButton" type="submit">Add file</button>
        </form>
      </section>

      <section class="admin-login-section hidden" id="adminLogin" aria-labelledby="adminLoginTitle">
        <form class="login-panel" id="loginForm">
          <p class="eyebrow">Private access</p>
          <h2 id="adminLoginTitle">Admin login</h2>
          <label>
            <span>Password</span>
            <input id="passwordInput" type="password" autocomplete="current-password" required placeholder="Enter admin password">
          </label>
          <button class="primary-button" type="submit">Login</button>
        </form>
      </section>

      <section class="content-section" aria-live="polite">
        <div class="section-heading files-heading">
          <div>
            <p class="eyebrow">Downloads</p>
            <h2>Available files</h2>
          </div>
          <button class="ghost-button" id="refreshButton" type="button">Refresh</button>
        </div>

        <div class="status-banner" id="statusBanner" role="status"></div>

        <div class="loading-state" id="loadingState">
          <span class="loader"></span>
          <span>Loading downloads...</span>
        </div>

        <div class="cards-grid" id="cardsGrid"></div>

        <div class="empty-state hidden" id="emptyState">
          <h3>No files found</h3>
          <p>Add files from the admin panel or try a different search.</p>
        </div>

        <div class="ad-band ad-native-main" aria-label="Sponsored content">
          <div class="native-main-shell">
            <script async data-cfasync="false"
              src="https://pl29538097.effectivecpmnetwork.com/17fcfae12b288e2760c37dd3c08d066b/invoke.js">
            </script>
            <div id="container-17fcfae12b288e2760c37dd3c08d066b"></div>
          </div>
        </div>
      </section>
    </main>

    <aside class="mobile-sticky-ad" aria-label="Mobile advertisement">
      <div class="mobile-ad-inner">
        <script>
          atOptions = {
            'key': 'e1f5d78d388fef7be41527447a14b4c9',
            'format': 'iframe',
            'height': 50,
            'width': 320,
            'params': {}
          };
        </script>
        <script src="https://www.highperformanceformat.com/e1f5d78d388fef7be41527447a14b4c9/invoke.js"></script>
      </div>
    </aside>

    <script src="https://pl29538096.effectivecpmnetwork.com/2b/8e/84/2b8e842fc7172c9c6e9453d58fd9a098.js"></script>
    <script src="https://pl29538098.effectivecpmnetwork.com/4a/18/53/4a1853f5ac193d9c4e94aa57aa940207.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
  </body>
</html>
