<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Download Hub</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0d0d0d;
color:white;
padding:20px;
padding-bottom:90px;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:20px;
margin-bottom:30px;
}

.logo{
font-size:32px;
font-weight:bold;
}

.search{
padding:12px;
width:300px;
max-width:100%;
border:none;
border-radius:12px;
}

.grid{
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(300px,1fr));
gap:20px;
}

.card{
background:#1b1b1b;
padding:15px;
border-radius:20px;
transition:.3s;
}

.card:hover{
transform:translateY(-6px);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
border-radius:10px;
}

.category{
display:inline-block;
margin-top:10px;
background:#333;
padding:6px 12px;
border-radius:20px;
font-size:12px;
}

.title{
font-size:22px;
margin-top:10px;
}

.desc{
color:#bbb;
margin:10px 0;
}

.btn{
padding:10px 15px;
border:none;
border-radius:10px;
cursor:pointer;
margin-top:8px;
margin-right:8px;
color:white;
background:#00c853;
}

.deleteBtn{
background:#d32f2f;
}

.admin{
margin-top:50px;
padding:25px;
background:#1b1b1b;
border-radius:20px;
}

.admin input,
.admin textarea{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:10px;
}

.ad-box{
margin:30px 0;
padding:20px;
border-radius:20px;
background:#1b1b1b;
text-align:center;
}

.mobileAd{
position:fixed;
bottom:0;
left:0;
width:100%;
z-index:999;
}

</style>
</head>

<body>

<header>

<div class="logo">

Download Hub

</div>

<input
class="search"
id="search"
placeholder="Search files..."
onkeyup="searchFiles()"
/>

</header>



<div class="ad-box">

YOUR TOP 728x90 BANNER

</div>



<div
class="grid"
id="container">

</div>



<div
id="loginBox"
class="admin">

<h2>

Admin Login

</h2>

<input
type="password"
id="adminPass"
placeholder="Enter Password"
/>

<button
class="btn"
onclick="login()">

Login

</button>

</div>




<div
id="adminPanel"
class="admin"
style="display:none"
>

<h2>

Admin Upload

</h2>

<input
id="name"
placeholder="Title"
/>

<textarea
id="desc"
placeholder="Description">
</textarea>

<input
id="category"
placeholder="PDF / APK / ZIP"
/>

<input
id="image"
placeholder="Thumbnail URL"
/>

<input
id="link"
placeholder="Google Drive Share Link"
/>

<button
class="btn"
onclick="addFile()">

Add File

</button>

<button
class="btn"
onclick="logout()">

Logout

</button>

</div>




<div class="ad-box">

YOUR SOCIAL BAR CODE

</div>




<div class="mobileAd">

<div class="ad-box">

YOUR 320x50 MOBILE AD

</div>

</div>




<script>

const ADMIN_PASSWORD=
"jaya@2911";

const container=
document.getElementById(
"container"
);

let files=

JSON.parse(
localStorage.getItem(
"files"
)
)||[];



function convertDrive(url){

const id=
url.match(
/[-\w]{25,}/
);

if(id){

return `https://drive.google.com/uc?export=download&id=${id[0]}`;

}

return url;

}



function render(){

let html="";

const isAdmin=

localStorage.getItem(
"admin"
)==="true";



files.forEach(
(file,index)=>{


html += `

<div class="card">

<img
src="${file.image}"
>

<div class="category">

${file.category}

</div>

<div class="title">

${file.name}

</div>

<div class="desc">

${file.desc}

</div>


<a
href="${file.link}"
target="_blank">

<button
class="btn">

Download

</button>

</a>


${
isAdmin

?

`<button
class="btn deleteBtn"
onclick="deleteFile(${index})">

Delete

</button>`

:

""

}


</div>

`;



if(
(index+1)%6===0
){

html+=`

<div class="ad-box">

YOUR NATIVE AD

</div>

`;

}

});


container.innerHTML=
html;

}


render();




function addFile(){


let obj={

name:
document
.getElementById(
"name"
).value,

desc:
document
.getElementById(
"desc"
).value,

category:
document
.getElementById(
"category"
).value,

image:
document
.getElementById(
"image"
).value,

link:

convertDrive(

document
.getElementById(
"link"
).value

)

};


files.push(
obj
);


localStorage.setItem(

"files",

JSON.stringify(
files
)

);


render();


document
.querySelectorAll(
".admin input,.admin textarea"
)
.forEach(
x=>x.value=""
);


}




function deleteFile(index){

let confirmDelete=

confirm(
"Delete file?"
);


if(
confirmDelete
){

files.splice(
index,
1
);


localStorage.setItem(

"files",

JSON.stringify(
files
)

);


render();

}

}




function searchFiles(){

let value=

document
.getElementById(
"search"
)
.value
.toLowerCase();



document
.querySelectorAll(
".card"
)
.forEach(card=>{

card.style.display=

card.innerText
.toLowerCase()
.includes(
value
)

?

"block"

:

"none";

});

}




function login(){

let pass=

document
.getElementById(
"adminPass"
)
.value;



if(
pass===ADMIN_PASSWORD
){

localStorage.setItem(
"admin",
"true"
);

showAdmin();

}

else{

alert(
"Wrong password"
);

}

}




function showAdmin(){

document
.getElementById(
"loginBox"
)
.style.display=
"none";


document
.getElementById(
"adminPanel"
)
.style.display=
"block";

}




function logout(){

localStorage.removeItem(
"admin"
);

location.reload();

}



if(

localStorage.getItem(
"admin"
)==="true"

){

showAdmin();

}

</script>

</body>
</html>
